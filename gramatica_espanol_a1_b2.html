<tr><td><strong>o sea / en definitiva</strong></td><td><em>En definitiva, hay que actuar.</em></td></tr>
<tr><td><strong>referente a / respecto a</strong></td><td><em>Referente a tu pregunta…</em></td></tr>
<tr><td><strong>finalmente / por último</strong></td><td><em>Finalmente, llegamos a un acuerdo.</em></td></tr>
</table>
<div class="callout cn"><div class="callout-title">aunque — 两种用法</div><em>Aunque <strong>llueve</strong> (事实), salgo.</em> → indicativo<br><em>Aunque <strong>llueva</strong> (假设), saldré.</em> → subjuntivo</div>`},
{id:'b1-17',title:'感情动词',sub:'sentimientos y sensaciones · inf. vs. subj.',tags:['valoracion','subjuntivo'],html:`
<table><tr><th>动词</th><th>+ infinitivo</th><th>+ que + subj.</th></tr>
<tr><td><strong>gustar / encantar</strong></td><td><em>Me gusta viajar.</em></td><td><em>Me gusta que vengas.</em></td></tr>
<tr><td><strong>molestar / fastidiar</strong></td><td><em>Me molesta esperar.</em></td><td><em>Me molesta que llegues tarde.</em></td></tr>
<tr><td><strong>odiar</strong></td><td><em>Odio mentir.</em></td><td><em>Odio que me interrumpan.</em></td></tr>
<tr><td><strong>irritar</strong></td><td><em>Me irrita repetirlo.</em></td><td><em>Me irrita que no escuches.</em></td></tr>
<tr><td><strong>entristecer / alegrar</strong></td><td><em>Me entristece verlo.</em></td><td><em>Me alegra que hayas venido.</em></td></tr>
<tr><td><strong>dar vergüenza</strong></td><td><em>Me da vergüenza decirlo.</em></td><td><em>Me da vergüenza que lo vean.</em></td></tr>
<tr><td><strong>es intolerable</strong></td><td><em>Es intolerable mentir.</em></td><td><em>Es intolerable que mientan.</em></td></tr>
<tr><td><strong>preocupar</strong></td><td><em>Me preocupa fallar.</em></td><td><em>Me preocupa que no llegues.</em></td></tr>
</table>`},
{id:'b1-18',title:'se 的各种用法',sub:'usos de se · reflexivo · impersonal · pasivo',tags:['pronombres'],html:`
<table><tr><th>用法</th><th>例句</th><th>说明</th></tr>
<tr><td><strong>Reflexivo</strong></td><td><em>Se lava las manos.</em></td><td>动作施于自身</td></tr>
<tr><td><strong>Recíproco</strong></td><td><em>Se quieren mucho.</em></td><td>两者互相</td></tr>
<tr><td><strong>Pasivo reflejo</strong></td><td><em>Se venden pisos.</em></td><td>被动（有主语）</td></tr>
<tr><td><strong>Impersonal</strong></td><td><em>Se dice que…</em></td><td>主语不明确</td></tr>
<tr><td><strong>Cambio de estado</strong></td><td><em>Se puso nervioso.</em></td><td>变得…</td></tr>
<tr><td><strong>OI → SE</strong></td><td><em>Se lo dije.</em></td><td>le/les + lo/la → se</td></tr>
<tr><td><strong>Aspectual</strong></td><td><em>Se comió todo el pastel.</em></td><td>强调完成</td></tr>
</table>
<div class="chips"><span class="chip">irse</span><span class="chip">quedarse</span><span class="chip">ponerse</span><span class="chip">volverse</span><span class="chip">hacerse</span><span class="chip">caerse</span><span class="chip">acordarse de</span><span class="chip">olvidarse de</span></div>`},
{id:'b1-19',title:'不定代词 / 指小词',sub:'indefinidos · diminutivos',tags:['pronombres'],html:`
<h3>Pronombres indefinidos</h3>
<table><tr><th>类型</th><th>肯定</th><th>否定/疑问</th></tr>
<tr><td>人</td><td>alguien</td><td>nadie</td></tr>
<tr><td>物</td><td>algo</td><td>nada</td></tr>
<tr><td>修饰阳名词</td><td>algún</td><td>ningún</td></tr>
<tr><td>修饰阴名词</td><td>alguna</td><td>ninguna</td></tr>
</table>
<h3>Diminutivos（指小词）</h3>
<table><tr><th>后缀</th><th>例</th><th>用法</th></tr>
<tr><td><strong>-ito/a</strong></td><td>casita, cafecito, problemita</td><td>亲昵/小/委婉</td></tr>
<tr><td><strong>-illo/a</strong></td><td>panillo, chiquillo</td><td>亲切或轻视</td></tr>
</table>`},
{id:'b1-20',title:'冠词深化 / por·para',sub:'artículo B1 · contraste por/para · finalidad',tags:['articulos','preposiciones'],html:`
<h3>定冠词特殊用法（B1）</h3>
<table><tr><th>用法</th><th>例句</th></tr>
<tr><td>类别泛指</td><td><em>Los perros son fieles.</em></td></tr>
<tr><td>事件地点（ser）</td><td><em>La fiesta <strong>es</strong> en el auditorio.</em></td></tr>
<tr><td>身体部位</td><td><em>Me duele <strong>la</strong> cabeza.</em></td></tr>
<tr><td>重量/价格</td><td><em>Cuesta 3€ <strong>el</strong> kilo.</em></td></tr>
</table>
<h3>por / para 对比</h3>
<table><tr><th>POR</th><th>PARA</th></tr>
<tr><td>原因：<em>Lo hice por ti.</em></td><td>目的：<em>Estudio para aprender.</em></td></tr>
<tr><td>持续时间：<em>por dos horas</em></td><td>期限：<em>para el lunes</em></td></tr>
<tr><td>交换：<em>Te lo cambio por este.</em></td><td>Destino：<em>Salgo para Madrid.</em></td></tr>
<tr><td>Agente：<em>Escrito por Cervantes.</em></td><td>Destinatario：<em>Es para ti.</em></td></tr>

a fin de (que) / con el fin de (que) + subj./inf.</pre>`},

let curLevel = 'a1', curSec = 'a1-1';

function switchLevel(lv, btn) {
  curLevel = lv;
  document.querySelectorAll('.lt').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('search').value = '';
  buildSidebar(lv);
  showSec(SECTIONS[lv][0].id);
}

function buildSidebar(lv, filter) {
  const list = document.getElementById('sec-list');
  list.innerHTML = '';
  SECTIONS[lv].forEach((sec, i) => {
    const el = document.createElement('div');
    const match = !filter || sec.title.toLowerCase().includes(filter) || (sec.sub && sec.sub.toLowerCase().includes(filter)) || sec.tags.some(t => t.includes(filter));
    el.className = 'sec-item' + (sec.id === curSec ? ' on' : '') + (match ? '' : ' hidden');
    el.dataset.id = sec.id;
    el.innerHTML = `<span class="sec-num">${lv.toUpperCase()}-${i+1}</span>${sec.title}`;
    el.onclick = () => showSec(sec.id);
    list.appendChild(el);
  });
}

function filterSecs(val) {
  const f = val.toLowerCase().trim();
  buildSidebar(curLevel, f || null);
}

function showSec(id) {
  curSec = id;
  const lv = id.split('-')[0];
  const sec = SECTIONS[lv].find(s => s.id === id);
  if (!sec) return;
  document.querySelectorAll('.sec-item').forEach(el => el.classList.toggle('on', el.dataset.id === id));
  const tagsHtml = [`<span class="tag nivel">#nivel/${lv}</span>`, ...sec.tags.map(t => `<span class="tag tema">#${t}</span>`)].join('');
  document.getElementById('content').innerHTML =
    `<div class="sec-title">${sec.title}</div>
     ${sec.sub ? `<div class="sec-sub">${sec.sub}</div>` : ''}
     <div class="sec-tags">${tagsHtml}</div>
     ${sec.html}`;
  document.querySelector('.main').scrollTo(0,0);
}

buildSidebar('a1');
showSec('a1-1');
</script>
